<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Singing Snake 🎵</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ffdae0;
            --dark-pink: #ff85a1;
            --cream: #fffdf9;
            --sage: #b7c9a2;
            --lavender: #e2d1f9;
            --blue: #a2d2ff;
            --text: #5c4a4a;
        }

        body {
            margin: 0;
            background-color: var(--pink);
            background-image: radial-gradient(var(--cream) 2px, transparent 2px);
            background-size: 40px 40px; 
            font-family: 'Quicksand', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 50px;
            border: 8px solid white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 650px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            margin: 0 0 15px 0;
            font-size: 2.8rem;
            color: var(--text);
        }

        #game-canvas {
            background-color: var(--cream);
            border-radius: 35px;
            border: 6px solid var(--sage);
            display: block;
            margin: 0 auto;
            width: 100%;
            height: auto;
            max-width: 600px;
        }

        .stats {
            margin-top: 20px;
            font-weight: 700;
            font-size: 1.5rem;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 50px;
            z-index: 10;
        }

        button {
            background: var(--sage);
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 60px;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(183, 201, 162, 0.4);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.05) translateY(-3px);
            background: var(--dark-pink);
            box-shadow: 0 10px 30px rgba(255, 133, 161, 0.4);
        }

        .hint {
            margin-top: 15px;
            font-size: 1rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>✨ Singing Snake 🐍</h1>
        <canvas id="game-canvas" width="600" height="600"></canvas>
        <div class="stats">Score: <span id="score">0</span></div>
        <div id="overlay">
            <h2 style="font-family: 'Playfair Display'; font-size: 2.2rem; font-style: italic; margin-bottom: 20px;">Ready to sing? 🎀</h2>
            <button id="start-btn">Start Game ✨</button>
            <p class="hint">Use your Arrow Keys to move!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');

        const gridSize = 30; 
        const tileCount = 20;

        let score = 0;
        let dx = 1;
        let dy = 0;
        let snake = [];
        let food = {x: 5, y: 5, icon: '🎵'};
        let gameActive = false;
        let gameLoopTimeout;
        
        // Removed the white segment so it pops!
        const pearlColors = ['#b7c9a2', '#ffdae0', '#e2d1f9', '#a2d2ff']; 
        const notes = ['🎵', '🎶', '🎼', '✨', '🌸', '🍭'];

        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playChime() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440 + (score * 20), audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        function drawGame() {
            if (!gameActive) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount ||
                snake.some(part => part.x === head.x && part.y === head.y)) {
                return endGame();
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreEl.innerText = score;
                playChime();
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount),
                    icon: notes[Math.floor(Math.random() * notes.length)]
                };
            } else {
                snake.pop();
            }

            ctx.fillStyle = '#fffdf9';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Subtle lines
            ctx.strokeStyle = '#f4f0e6';
            ctx.lineWidth = 2;
            for(let i=0; i<canvas.height; i+=gridSize*2) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Food
            ctx.font = '28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(food.icon, food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/1.2);

            // Snake
            snake.forEach((part, index) => {
                ctx.fillStyle = pearlColors[index % pearlColors.length];
                ctx.beginPath();
                ctx.arc(part.x * gridSize + gridSize/2, part.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
                ctx.fill();
                // Pearl shine
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.arc(part.x * gridSize + gridSize/3, part.y * gridSize + gridSize/3, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            gameLoopTimeout = setTimeout(drawGame, 130);
        }

        function startGame() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            clearTimeout(gameLoopTimeout);
            score = 0;
            scoreEl.innerText = score;
            dx = 1; dy = 0;
            snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
            gameActive = true;
            overlay.style.display = 'none';
            drawGame();
        }

        function endGame() {
            gameActive = false;
            overlay.style.display = 'flex';
            overlay.querySelector('h2').innerText = "Vocal Break! ☕";
            overlay.querySelector('button').innerText = "Sing Again 🎀";
        }

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            switch(e.key) {
                case 'ArrowUp':    if(dy !== 1)  { dx = 0; dy = -1; } break;
                case 'ArrowDown':  if(dy !== -1) { dx = 0; dy = 1;  } break;
                case 'ArrowLeft':  if(dx !== 1)  { dx = -1; dy = 0; } break;
                case 'ArrowRight': if(dx !== -1) { dx = 1; dy = 0;  } break;
            }
        });

        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
